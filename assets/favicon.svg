<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0e0c0a" stroke="#e8884a" stroke-opacity="0.2" stroke-width="1.2"/>
  
  <!-- Shared vertical stem -->
  <line x1="13.5" y1="7" x2="13.5" y2="25" stroke="#f0e6d3" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Left-side P Loop -->
  <path d="M13.5 7 H9.5 C6.5 7, 6.5 15, 13.5 15" stroke="#f5c278" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <!-- Right-side K Branches -->
  <line x1="13.5" y1="15" x2="20.5" y2="8" stroke="#e8884a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="13.5" y1="15" x2="20.5" y2="22" stroke="#e8884a" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Terminal cursor dot/underscore next to the logo -->
  <line x1="22" y1="22" x2="25" y2="22" stroke="#f5c278" stroke-width="2.5" stroke-linecap="round"/>
</svg>
